apiVersion: v1
kind: Pod

metadata:
  name: crm-backend
  labels:
    app: crm-backend

spec:
  containers:
    - name: backend
      image: singhsarvesh/crm-backend:5
      imagePullPolicy: IfNotPresent

      ports:
        - containerPort: 8000

      env:
        - name: APP_ENV
          value: production

        - name: APP_DEBUG
          value: "false"

        - name: DB_CONNECTION
          value: mysql

        - name: DB_HOST
          value: mysql

        - name: DB_PORT
          value: "3306"

        - name: DB_DATABASE
          value: crmdb

        - name: DB_USERNAME
          value: root

        - name: DB_PASSWORD
          value: root
