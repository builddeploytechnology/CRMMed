apiVersion: v1
kind: Pod

metadata:
  name: mysql
  labels:
    app: mysql

spec:
  containers:
    - name: mysql
      image: mysql:8.0
      imagePullPolicy: IfNotPresent

      ports:
        - containerPort: 3306

      env:
        - name: MYSQL_ROOT_PASSWORD
          value: root

        - name: MYSQL_DATABASE
          value: crmdb
