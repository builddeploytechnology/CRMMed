apiVersion: apps/v1
kind: Deployment

metadata:
  name: crm-backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: crm-backend

  template:
    metadata:
      labels:
        app: crm-backend

    spec:
      containers:
        - name: backend
          image: singhsarvesh/crm-backend:7
          imagePullPolicy: Always

          ports:
            - containerPort: 8000
